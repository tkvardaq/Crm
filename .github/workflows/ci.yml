name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: '20'
  NPM_VERSION: '11.9.0'

jobs:
  lint-typecheck:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Run typecheck
        run: npm run typecheck

  test:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: admin
          POSTGRES_PASSWORD: test
          POSTGRES_DB: crm_db
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U admin -d crm_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npm run db:generate
        env:
          DATABASE_URL: postgresql://admin:test@localhost:5432/crm_db?schema=public

      - name: Run migrations
        run: npm run db:migrate
        env:
          DATABASE_URL: postgresql://admin:test@localhost:5432/crm_db?schema=public

      - name: Seed database
        run: npx tsx tsx scripts/seed.ts
        env:
          DATABASE_URL: postgresql://admin:test@localhost:5432/crm_db?schema=public
          SEED_PASSWORD: test-password123

      - name: Run tests
        run: npm test
        env:
          DATABASE_URL: postgresql://admin:test@localhost:5432/crm_db?schema=public
          REDIS_URL: redis://localhost:6379
          FERNET_KEY: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
          ENCRYPTION_KEY: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
          NEXTAUTH_SECRET: test-secret-min-32-chars-long
          CRON_SECRET: test-cron-secret
          LEGACY_SALT: test-legacy-salt

  build:
    name: Build Packages & Web
    runs-on: ubuntu-latest
    needs: [lint-typecheck, test]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npm run db:generate

      - name: Build all packages
        run: npm run build:packages

      - name: Build web app
        run: npm run build --workspace=@crm/web

  docker:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build web image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: crm-web:${{ github.sha }}
          load: true

      - name: Build worker images
        run: |
          for worker in email-dispatcher imap-sync dns-checker decay-tracker warmup ai-worker scraper-worker enrichment-worker; do
            docker build --build-arg WORKER_NAME=$worker -f Dockerfile.worker -t crm-$worker:${{ github.sha }} .
          done

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Check for secrets with gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}