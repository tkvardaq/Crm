name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint-typecheck:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate --schema=packages/database/schema.prisma

      - name: Build shared packages
        run: |
          npm run build --workspace=@crm/shared || true
          npm run build --workspace=@crm/database || true

      - name: Lint
        run: npm run lint --workspace=@crm/web

      - name: Typecheck
        run: npm run typecheck --workspace=@crm/web

  test:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: admin
          POSTGRES_PASSWORD: test
          POSTGRES_DB: crm_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U admin -d crm_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate --schema=packages/database/schema.prisma
        env:
          DATABASE_URL: postgresql://admin:test@localhost:5432/crm_db

      - name: Run migrations
        run: npx prisma migrate deploy --schema=packages/database/schema.prisma
        env:
          DATABASE_URL: postgresql://admin:test@localhost:5432/crm_db

      - name: Run tests
        run: npm test
        env:
          DATABASE_URL: postgresql://admin:test@localhost:5432/crm_db
          REDIS_URL: redis://localhost:6379
          FERNET_KEY: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
          ENCRYPTION_KEY: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
          NEXTAUTH_SECRET: test-secret-min-32-chars-long-padding
          CRON_SECRET: test-cron-secret
          LEGACY_SALT: test-legacy-salt

  build:
    name: Build Packages & Web
    runs-on: ubuntu-latest
    needs: [lint-typecheck, test]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate --schema=packages/database/schema.prisma

      - name: Build all packages
        run: npm run build:packages

      - name: Build web app
        run: npm run build --workspace=@crm/web

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          exit-code: '0'

      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'