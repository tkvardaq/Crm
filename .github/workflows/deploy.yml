name: Deploy Production

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'production'
        type: choice
        options:
          - staging
          - production

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    name: Deploy to ${{ github.event.inputs.environment }}
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push web image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository }}/crm-web:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push worker images
        run: |
          for worker in email-dispatcher imap-sync dns-checker decay-tracker warmup ai-worker scraper-worker enrichment-worker; do
            docker build --build-arg WORKER_NAME=$worker -f Dockerfile.worker -t ghcr.io/${{ github.repository }}/crm-$worker:${{ github.sha }} .
            docker push ghcr.io/${{ github.repository }}/crm-$worker:${{ github.sha }}
          done

      - name: Deploy to server
        run: |
          echo "Deploy to ${{ github.event.inputs.environment }} server"
          # Example for SSH deployment:
          # ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} "
          #   docker compose -f docker-compose.${{ github.event.inputs.environment }}.yml pull
          #   docker compose -f docker-compose.${{ github.event.inputs.environment }}.yml up -d --remove-orphans
          #   docker image prune -f
          # "
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}

      - name: Run migrations
        run: |
          echo "Run database migrations"
          # Example:
          # ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} "
          #   docker exec crm-web npx prisma migrate deploy --schema=packages/database/schema.prisma
          # "

      - name: Health check
        run: |
          echo "Verify deployment health"
          # curl -f https://${{ github.event.inputs.environment }}.yourdomain.com/api/health || exit 1

      - name: Notify
        if: always()
        run: |
          STATUS="${{ job.status }}"
          echo "Deployment $STATUS"
          # Add Slack/Discord notification here